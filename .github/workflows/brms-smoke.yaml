# Exercises the brms/Stan imputation path that the main R-CMD-check skips
# (those tests are gated on BRMS_SMOKE_TEST=1).
#
# Uses the **cmdstanr** backend rather than rstan: rstan's runtime model
# compilation does not work on the GitHub ubuntu runner (the compile fails
# near-instantly), whereas CmdStan builds reliably via its own make toolchain.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: brms-smoke.yaml

permissions: read-all

jobs:
  brms-smoke:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      BRMS_SMOKE_TEST: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            stan-dev/cmdstanr
            any::brms
            any::testthat
            any::devtools
          needs: check

      # CmdStan is ~hundreds of MB and takes a few minutes to build; cache it
      # across runs.  Bump the key suffix to force a rebuild.
      - name: Cache CmdStan
        id: cache-cmdstan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-v1

      - name: Install CmdStan
        if: steps.cache-cmdstan.outputs.cache-hit != 'true'
        run: |
          cmdstanr::check_cmdstan_toolchain(fix = TRUE)
          cmdstanr::install_cmdstan(cores = 2)
        shell: Rscript {0}

      - name: Show Stan/toolchain config
        run: |
          cat("brms:", as.character(packageVersion("brms")), "\n")
          cat("cmdstanr:", as.character(packageVersion("cmdstanr")), "\n")
          cat("cmdstan path:", cmdstanr::cmdstan_path(), "\n")
          cat("cmdstan version:", cmdstanr::cmdstan_version(), "\n")
        shell: Rscript {0}

      - name: Run brms smoke tests (BRMS_SMOKE_TEST=1, cmdstanr backend)
        # Scope to test-impute-smoke.R: it exercises the full brms/Stan path
        # (fit_imputation_model + impute_chemistry for rescor_mi / cens /
        # cens_factor) without needing the gitignored SSD guideline data that
        # the add_amspaf-based pipeline smoke test requires.
        run: |
          options(mc.cores = 2, brms.backend = "cmdstanr")
          res <- devtools::test(filter = "impute-smoke")
          df  <- as.data.frame(res)
          cat(sprintf("\nPASS %d | FAIL %d | WARN %d | SKIP %d\n",
                      sum(df$passed), sum(df$failed),
                      sum(df$warning), sum(df$skipped)))
          if (sum(df$failed) > 0 || any(df$error)) quit(status = 1L)
          if (sum(df$skipped) > 0)
            stop("brms smoke tests skipped — brms/Stan not available in CI.")
        shell: Rscript {0}
